# Server Config
server.port=8080

# Database Connection (Replace placeholders with your local MySQL credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/YOUR_DATABASE_NAME?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (Change secret for production)
app.jwt-secret=9a4f2c8d3b7a1e5f8c3d6b2a1e4f9c8d7b3a6e5f2c1d9b8a7f6e5d4c3b2a1f0d
# 1 day expiration (24 * 60 * 60 * 1000 = 86400000 milliseconds)
app.jwt-expiration-milliseconds=86400000
